          <div class="card span-4 metric"><span>Ventas de la semana</span><strong>${money.format(stats.sales.week.total)}</strong><small>${stats.sales.week.count} operaciones · ${stats.sales.week.units} unidades</small></div>
          <div class="card span-4 metric"><span>Ventas del mes</span><strong>${money.format(stats.sales.month.total)}</strong><small>${stats.sales.month.count} operaciones · ${stats.sales.month.units} unidades</small></div>

          <div class="card span-4 metric"><span>Pagos de hoy</span><strong>${money.format(stats.payments.today.total)}</strong><small>${stats.payments.today.count} registros</small></div>
          <div class="card span-4 metric"><span>Pagos de la semana</span><strong>${money.format(stats.payments.week.total)}</strong><small>${stats.payments.week.count} registros</small></div>
          <div class="card span-4 metric"><span>Pagos del mes</span><strong>${money.format(stats.payments.month.total)}</strong><small>${stats.payments.month.count} registros</small></div>

          <div class="card span-4 metric"><span>Saldo operativo de hoy</span><strong>${money.format(stats.sales.today.total - stats.payments.today.total)}</strong><small>Ventas - pagos</small></div>
          <div class="card span-4 metric"><span>Saldo operativo semanal</span><strong>${money.format(stats.sales.week.total - stats.payments.week.total)}</strong><small>Ventas - pagos</small></div>
          <div class="card span-4 metric"><span>Saldo operativo mensual</span><strong>${money.format(stats.sales.month.total - stats.payments.month.total)}</strong><small>Ventas - pagos</small></div>

          <div class="card span-12">
            <h3>Movimientos de stock</h3>
            <div class="dashboard-metrics">
              <div class="card metric"><span>Ingresos hoy</span><strong>${stats.stock.today.inQty}</strong><small>unidades ingresadas</small></div>
              <div class="card metric"><span>Salidas hoy</span><strong>${Math.abs(stats.stock.today.outQty)}</strong><small>unidades vendidas/retiradas</small></div>
              <div class="card metric"><span>Movimientos semana</span><strong>${stats.stock.week.count}</strong><small>Entradas ${stats.stock.week.inQty} · Salidas ${Math.abs(stats.stock.week.outQty)}</small></div>
              <div class="card metric"><span>Movimientos mes</span><strong>${stats.stock.month.count}</strong><small>Entradas ${stats.stock.month.inQty} · Salidas ${Math.abs(stats.stock.month.outQty)}</small></div>
            </div>
          </div>

          <div class="card span-6">
            <h3>Ventas por período</h3>
            ${renderPeriodTable([
              ['Hoy', stats.sales.today.count, stats.sales.today.units, money.format(stats.sales.today.total), stats.sales.today.avg],
              ['Semana', stats.sales.week.count, stats.sales.week.units, money.format(stats.sales.week.total), stats.sales.week.avg],
              ['Mes', stats.sales.month.count, stats.sales.month.units, money.format(stats.sales.month.total), stats.sales.month.avg]
            ], ['Período', 'Ventas', 'Unidades', 'Total', 'Ticket prom.'])}
          </div>

          <div class="card span-6">
            <h3>Pagos por período</h3>
            ${renderPeriodTable([
              ['Hoy', stats.payments.today.count, '-', money.format(stats.payments.today.total), '-'],
              ['Semana', stats.payments.week.count, '-', money.format(stats.payments.week.total), '-'],
              ['Mes', stats.payments.month.count, '-', money.format(stats.payments.month.total), '-']
            ], ['Período', 'Registros', 'Unidades', 'Total', 'Referencia'])}
          </div>

          <div class="card span-6">
            <h3>Pagos del mes por tipo</h3>
            ${renderSummaryRows(stats.paymentsByType, 'Sin pagos en el mes.')}
          </div>

          <div class="card span-6">
            <h3>Productos más vendidos del mes</h3>
            ${renderTopProducts(stats.topProducts)}
          </div>

          <div class="card span-12">
            <h3>Movimientos consolidados</h3>
            ${renderRecentMovementsTable(40)}
          </div>

          <div class="card span-6">
            <h3>Ventas recientes</h3>
            ${renderSalesTable(state.sales.slice(-30).reverse())}
          </div>

          <div class="card span-6">
            <h3>Pagos recientes</h3>
            ${renderPaymentsTable((state.payments || []).slice().reverse().slice(0, 30))}
          </div>

          <div class="card span-12">
            <h3>Stock: últimos movimientos</h3>
            ${renderMovesTable((state.stockMoves || []).slice().reverse().slice(0, 50))}
          </div>
        </div>`;
    }

    function startOfCurrentWeek() {
      const d = new Date();
      d.setHours(0, 0, 0, 0);
      const day = d.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      d.setDate(d.getDate() + diff);
      return d;
    }

    function isTodayDate(dateValue) {
      return new Date(dateValue).toDateString() === new Date().toDateString();
    }

    function isCurrentWeekDate(dateValue) {
      const d = new Date(dateValue);
      const start = startOfCurrentWeek();
      const end = new Date(start);
      end.setDate(start.getDate() + 7);
      return d >= start && d < end;
    }

    function isCurrentMonthDate(dateValue) {
      const d = new Date(dateValue);
      const now = new Date();
      return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
    }

    function buildManagementStats() {
      const sales = state.sales || [];
      const payments = state.payments || [];
      const moves = state.stockMoves || [];

      const calcSales = filterFn => {
        const rows = sales.filter(s => filterFn(s.date));
        const total = rows.reduce((a, s) => a + Number(s.total || 0), 0);
        const units = rows.flatMap(s => s.items || []).reduce((a, i) => a + Number(i.qty || 0), 0);
        return { count: rows.length, total, units, avg: rows.length ? money.format(total / rows.length) : money.format(0) };
      };

      const calcPayments = filterFn => {
        const rows = payments.filter(p => filterFn(p.date));
        const total = rows.reduce((a, p) => a + Number(p.amount || 0), 0);
        return { count: rows.length, total };
      };

      const calcStock = filterFn => {
        const rows = moves.filter(m => filterFn(m.date));
        const inQty = rows.filter(m => Number(m.qty || 0) > 0).reduce((a, m) => a + Number(m.qty || 0), 0);
        const outQty = rows.filter(m => Number(m.qty || 0) < 0).reduce((a, m) => a + Number(m.qty || 0), 0);
        return { count: rows.length, inQty, outQty };
      };

      const monthPayments = payments.filter(p => isCurrentMonthDate(p.date));
      const paymentsByType = monthPayments.reduce((acc, p) => {
        const key = p.type || 'Otros';
        acc[key] = (acc[key] || 0) + Number(p.amount || 0);
        return acc;
      }, {});

      const monthSales = sales.filter(s => isCurrentMonthDate(s.date));
      const topMap = {};
      monthSales.forEach(s => (s.items || []).forEach(i => {
        const key = i.productId || i.name;
        if (!topMap[key]) topMap[key] = { name: i.name, qty: 0, total: 0 };
        topMap[key].qty += Number(i.qty || 0);
        topMap[key].total += Number(i.qty || 0) * Number(i.price || 0);
      }));
      const topProducts = Object.values(topMap).sort((a, b) => b.qty - a.qty).slice(0, 8);

      return {
        sales: { today: calcSales(isTodayDate), week: calcSales(isCurrentWeekDate), month: calcSales(isCurrentMonthDate) },
        payments: { today: calcPayments(isTodayDate), week: calcPayments(isCurrentWeekDate), month: calcPayments(isCurrentMonthDate) },
        stock: { today: calcStock(isTodayDate), week: calcStock(isCurrentWeekDate), month: calcStock(isCurrentMonthDate) },
        paymentsByType,
        topProducts
      };
    }

    function renderPeriodTable(rows, headers) {
      return `<table><thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
    }

    function renderSummaryRows(obj, emptyText) {
      const rows = Object.entries(obj || {}).sort((a, b) => b[1] - a[1]);
      if (!rows.length) return `<p>${emptyText}</p>`;
      return `<table><thead><tr><th>Tipo</th><th>Total</th></tr></thead><tbody>${rows.map(([k, v]) => `<tr><td>${escapeHtml(k)}</td><td>${money.format(v)}</td></tr>`).join('')}</tbody></table>`;
    }

    function renderTopProducts(rows) {
      if (!rows.length) return '<p>Sin ventas registradas en el mes.</p>';
      return `<table><thead><tr><th>Producto</th><th>Unidades</th><th>Total vendido</th></tr></thead><tbody>${rows.map(r => `<tr><td>${escapeHtml(r.name)}</td><td>${r.qty}</td><td>${money.format(r.total)}</td></tr>`).join('')}</tbody></table>`;
    }

    function renderSalesTable(rowsArg) {
      const rows = rowsArg || state.sales.slice(-30).reverse();
      if (!rows.length) return '<p>Sin ventas registradas.</p>';
      return `<table><thead><tr><th>Fecha</th><th>Items</th><th>Total</th><th>Pago</th></tr></thead><tbody>${rows.map(s => `<tr><td>${fmtDate(s.date)}</td><td>${(s.items || []).map(i=>`${escapeHtml(i.name)} x${i.qty}`).join('<br>')}</td><td>${money.format(s.total)}</td><td>${escapeHtml(s.payment)}</td></tr>`).join('')}</tbody></table>`;
    }


    function renderRecentMovementsTable(limit = 10) {
      // Consolidado de gestión: usa ventas maestras, pagos y movimientos de stock.
      // Las ventas se leen desde state.sales para no perder operaciones que no generan movimiento de stock
      // directo, como varios, productos sin control de stock o pedidos cliente ya convertidos en venta.
      const saleRows = (state.sales || []).map(s => ({
        date: s.date,
        flow: 'Venta',
        detail: (s.items || []).map(i => `${i.name} x${i.qty}`).join(' · ') || 'Venta registrada',
        type: s.payment || 'Venta',
        amount: Number(s.total || 0),
        reference: s.note || `Venta ${s.id || ''}`
      }));

      const stockRows = (state.stockMoves || [])
        .filter(m => m.type !== 'venta')
        .map(m => ({
          date: m.date,
          flow: 'Stock',
          detail: getProduct(m.productId)?.name || 'Producto eliminado',
          type: m.type,
          amount: m.qty,
          reference: `${m.before} → ${m.after}`
        }));

      const paymentRows = (state.payments || []).map(p => ({
        date: p.date,
        flow: 'Pago',
        detail: p.concept || (p.supplierId ? `Pago a ${getSupplier(p.supplierId).name}` : 'Pago registrado'),
        type: p.type,
        amount: -Number(p.amount || 0),
        reference: `${p.method || '-'}${p.supplierId ? ' · ' + getSupplier(p.supplierId).name : ''}`
      }));

      const rows = saleRows.concat(paymentRows, stockRows)
        .sort((a, b) => new Date(b.date) - new Date(a.date))
        .slice(0, limit);
      if (!rows.length) return '<p>Sin movimientos.</p>';
      return `<table><thead><tr><th>Fecha</th><th>Flujo</th><th>Detalle</th><th>Tipo</th><th>Importe / Cant.</th><th>Referencia</th></tr></thead><tbody>${rows.map(r => {
        const badgeClass = r.flow === 'Pago' ? 'bad' : (r.flow === 'Venta' ? 'ok' : 'blue');
        const amountText = r.flow === 'Pago'
          ? money.format(Math.abs(r.amount))
          : (r.flow === 'Venta' ? money.format(r.amount) : r.amount);
        return `<tr><td>${fmtDate(r.date)}</td><td><span class="badge ${badgeClass}">${r.flow}</span></td><td>${escapeHtml(r.detail)}</td><td>${escapeHtml(r.type)}</td><td>${amountText}</td><td>${escapeHtml(r.reference)}</td></tr>`;
      }).join('')}</tbody></table>`;
    }

    function renderMovesTable(rows) {
      if (!rows.length) return '<p>Sin movimientos.</p>';
      return `<table><thead><tr><th>Fecha</th><th>Producto</th><th>Tipo</th><th>Cant.</th><th>Stock</th></tr></thead><tbody>${rows.map(m => `<tr><td>${fmtDate(m.date)}</td><td>${getProduct(m.productId)?.name || 'Producto eliminado'}</td><td>${m.type}</td><td>${m.qty}</td><td>${m.before} → ${m.after}</td></tr>`).join('')}</tbody></table>`;
    }

    function val(id) { return document.getElementById(id)?.value?.trim() || ''; }
    function num(id) { return Number(document.getElementById(id)?.value || 0); }
    function escapeHtml(s) { return String(s || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
    function escapeAttr(s) { return String(s || '').replace(/'/g, '&#39;').replace(/"/g, '&quot;'); }

    function exportData() {
      const data = JSON.stringify(state, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'kio360-datos.json'; a.click();
      URL.revokeObjectURL(url);
    }

    function importDataPrompt() {
      const input = document.createElement('input');
      input.type = 'file'; input.accept = 'application/json';
      input.onchange = e => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = () => { try { state = JSON.parse(reader.result); save(); render(); showToast('Datos importados.'); } catch { showToast('Archivo inválido.'); } };
        reader.readAsText(file);
      };
      input.click();
    }

    function resetDemo() {
      if (!confirm('Esto reemplaza los datos actuales por la demo inicial.')) return;
      state = JSON.parse(JSON.stringify(initialState));
      save(); render(); showToast('Demo restaurada.');
    }

    window.addEventListener('hashchange', () => {
      if (isPublicStoreMode()) setView('tienda');
      else if (location.hash.includes('tienda') && canAccessView('tienda')) setView('tienda');
    });

    rebuildSuggestedOrders();
    if (isPublicStoreMode()) activeView = 'tienda';
    else if (location.hash.includes('tienda') && canAccessView('tienda')) activeView = 'tienda';
    render();
  </script>
</body>
